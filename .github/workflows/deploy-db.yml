name: Deploy Database to AWS RDS

on:
  push:
    paths:
      - '**.sql' # This makes the action run only when you change a .sql file
  workflow_dispatch: # This allows you to run it manually from the GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Execute SQL Script on RDS
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: postgres # Change this if your master username is different
          DB_NAME: postgres # Change this to your specific DB name
        run: |
          # Replace 'database.sql' with the actual name of your file
          psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f database.sql
